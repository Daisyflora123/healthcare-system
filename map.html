<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Map - EnviroHealth Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map {
      width: 100%;
      height: 550px;
      border-radius: 12px;
      margin-top: 20px;
      border: 1px solid var(--card-border);
    }
  </style>
</head>
<body data-theme="dark">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav class="navbar">
    <div class="brand">
      <i class="fa-solid fa-leaf" style="color: var(--accent);"></i>
      EnviroHealth <span>Hub</span>
    </div>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="risk.html" class="nav-link">Plan</a>
      <a href="trends.html" class="nav-link">Trends</a>

      <a href="map.html" class="nav-link active">Map</a>
      <a href="chatbot.html" class="nav-link">AI Assistant</a>
    </div>

    <div class="search-container">
      <button class="btn" onclick="toggleTheme()" title="Toggle Light/Dark Mode"><i id="themeIcon" class="fa-solid fa-sun"></i></button>
      <span style="color: var(--text-muted); align-self: center; margin-right: 15px;">Monitoring: <strong id="headerCity" style="color: white;">--</strong></span>
      <a href="alerts.html" class="btn" title="Alerts"><i class="fa-solid fa-bell"></i></a>
    </div>
  </nav>

  <main class="container">
    <h1 class="city-title">City Sensor Network</h1>
    <p class="city-subtitle">Live pollution variations across localized district sensors.</p>

    <!-- Map AQI Legend -->
    <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--card-border); align-items: center;">
      <div style="color: var(--text-main); font-weight: 600; font-size: 14px;">AQI Scale:</div>
      <div style="display: flex; align-items: center; gap: 8px;"><div style="width: 12px; height: 12px; border-radius: 50%; background-color: green; box-shadow: 0 0 5px green;"></div> <span style="font-size: 14px;">0-50 (Good)</span></div>
      <div style="display: flex; align-items: center; gap: 8px;"><div style="width: 12px; height: 12px; border-radius: 50%; background-color: yellow; box-shadow: 0 0 5px yellow;"></div> <span style="font-size: 14px;">51-100 (Moderate)</span></div>
      <div style="display: flex; align-items: center; gap: 8px;"><div style="width: 12px; height: 12px; border-radius: 50%; background-color: orange; box-shadow: 0 0 5px orange;"></div> <span style="font-size: 14px;">101-150 (Poor)</span></div>
      <div style="display: flex; align-items: center; gap: 8px;"><div style="width: 12px; height: 12px; border-radius: 50%; background-color: red; box-shadow: 0 0 5px red;"></div> <span style="font-size: 14px;">150+ (Severe)</span></div>
    </div>

    <div class="glass-card" style="margin-top: 30px; padding: 10px;">
      <div id="map"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/features.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // Check auth
      if (!localStorage.getItem("ecoPulse_userName")) { window.location.href = "login.html"; return; }

      const city = localStorage.getItem("ecoPulse_lastCity") || "Delhi";
      document.getElementById("headerCity").innerText = city;
      const savedLat = localStorage.getItem("ecoPulse_lastLat");
      const savedLon = localStorage.getItem("ecoPulse_lastLon");

      try {
        let lat, lon;
        
        if (savedLat && savedLon) {
            lat = parseFloat(savedLat);
            lon = parseFloat(savedLon);
        } else {
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
            const geoRes = await fetch(geoUrl);
            const geoData = await geoRes.json();
    
            if (geoData.results && geoData.results.length > 0) {
              lat = geoData.results[0].latitude;
              lon = geoData.results[0].longitude;
            } else {
              throw new Error("Geocoding failed.");
            }
        }

        // Initialize Map
        const map = L.map('map').setView([lat, lon], 15);

        // Standard OpenStreetMap Tile Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 18
        }).addTo(map);

        // Get baseline AQI for simulation
        const cityData = await getCityData(city, lat, lon);
        const baseAqi = cityData ? cityData.aqi : 50;

        // Create localized simulated network nodes
        // Tightly clustered 300m - 500m around the exact placement
        const nodes = [
           { label: city, latOffset: 0, lonOffset: 0, aqiMod: 0 },
           { label: "Community Block", latOffset: 0.003, lonOffset: 0.004, aqiMod: 15 },
           { label: "Local Street", latOffset: -0.004, lonOffset: -0.002, aqiMod: -5 },
           { label: "Nearby Intersection", latOffset: -0.002, lonOffset: 0.005, aqiMod: 25 },
           { label: "Green Area", latOffset: 0.005, lonOffset: -0.004, aqiMod: -20 }
        ];

        nodes.forEach(n => {
            const localAqi = Math.max(0, baseAqi + n.aqiMod);
            
            // Pick color based on AQI
            let color = "green";
            if(localAqi > 50) color = "yellow";
            if(localAqi > 100) color = "orange";
            if(localAqi > 150) color = "red";

            // custom CSS marker via FontAwesome
            const markerHtml = `<div style="background-color: white; border: 3px solid ${color}; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 10px rgba(0,0,0,0.5);">
               <i class="fa-solid fa-wind" style="color: ${color}; font-size: 14px;"></i>
            </div>`;

            const customIcon = L.divIcon({
                html: markerHtml,
                className: '',
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            L.marker([lat + n.latOffset, lon + n.lonOffset], { icon: customIcon }).addTo(map)
                .bindPopup(`<b>${n.label}</b><br>Estimated AQI: <strong>${localAqi}</strong>`);
        });

      } catch(e) {
        console.error(e);
        document.getElementById('map').innerHTML = "<p style='color: white; padding: 20px;'>Unable to load map.</p>";
      }
    });
  </script>
</body>
</html>
